<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Drone GLB Debug</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: #111318;
        color: #e5e7eb;
        font: 13px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
      #status {
        position: fixed;
        top: 12px;
        left: 12px;
        padding: 8px 10px;
        background: rgba(0, 0, 0, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 8px;
        white-space: pre-wrap;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
      }
    </script>
  </head>
  <body>
    <div id="status">loading</div>
    <canvas id="c"></canvas>
    <script type="module">
      import * as THREE from 'three';
      import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

      const canvas = document.getElementById('c');
      const status = document.getElementById('status');

      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      renderer.setSize(innerWidth, innerHeight);
      renderer.outputColorSpace = THREE.SRGBColorSpace;

      const scene = new THREE.Scene();
      scene.background = new THREE.Color('#111318');

      const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 100);
      camera.position.set(0, 1.2, 4.4);
      camera.lookAt(0, 0, 0);

      scene.add(new THREE.HemisphereLight('#dbeafe', '#111827', 1.4));
      const key = new THREE.DirectionalLight('#ffffff', 2.8);
      key.position.set(3, 4, 5);
      scene.add(key);
      const fill = new THREE.DirectionalLight('#93c5fd', 1.2);
      fill.position.set(-4, 2, -3);
      scene.add(fill);

      const ground = new THREE.Mesh(
        new THREE.CircleGeometry(3.5, 48),
        new THREE.MeshBasicMaterial({ color: '#1b2330' }),
      );
      ground.rotation.x = -Math.PI / 2;
      ground.position.y = -0.65;
      scene.add(ground);

      const loader = new GLTFLoader();
      const root = new THREE.Group();
      scene.add(root);

      const bounds = new THREE.Box3();
      const size = new THREE.Vector3();
      const center = new THREE.Vector3();

      loader.load(
        '/logo-drone-source.glb',
        (gltf) => {
          const model = gltf.scene;
          model.traverse((node) => {
            if (!node.isMesh) return;
            node.geometry = node.geometry.clone();
            node.geometry.computeVertexNormals();
            node.material = new THREE.MeshStandardMaterial({
              color: '#4b5563',
              roughness: 0.5,
              metalness: 0.2,
              side: THREE.DoubleSide,
            });
          });

          bounds.setFromObject(model);
          bounds.getCenter(center);
          bounds.getSize(size);
          model.position.sub(center);

          const maxDim = Math.max(size.x, size.y, size.z) || 1;
          const scale = 2.3 / maxDim;
          model.scale.setScalar(scale);
          model.rotation.set(0.35, 0.95, 0.08);
          root.add(model);

          status.textContent = [
            'loaded',
            `size: ${size.x.toFixed(3)}, ${size.y.toFixed(3)}, ${size.z.toFixed(3)}`,
            `scale: ${scale.toFixed(3)}`,
          ].join('\n');
        },
        undefined,
        (error) => {
          console.error(error);
          status.textContent = `error: ${error?.message || error}`;
        },
      );

      addEventListener('resize', () => {
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
      });

      function tick() {
        requestAnimationFrame(tick);
        root.rotation.y += 0.003;
        renderer.render(scene, camera);
      }
      tick();
    </script>
  </body>
</html>
